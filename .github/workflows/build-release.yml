name: Build & Release

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:

  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake ninja-build zip

    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Package
      run: |
        mkdir dist
        cp -r build/* dist/
        cd dist
        zip -r jancy-linux-x64.zip .

    - uses: actions/upload-artifact@v4
      with:
        name: linux
        path: dist/jancy-linux-x64.zip


  build-windows:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release

    - name: Package
      run: |
        mkdir dist
        copy build\Release\* dist\
        powershell Compress-Archive dist jancy-windows-x64.zip

    - uses: actions/upload-artifact@v4
      with:
        name: windows
        path: jancy-windows-x64.zip


  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install
      run: brew install cmake

    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(sysctl -n hw.ncpu)

    - name: Package
      run: |
        mkdir dist
        cp -r build/* dist/
        cd dist
        zip -r jancy-macos.zip .

    - uses: actions/upload-artifact@v4
      with:
        name: macos
        path: dist/jancy-macos.zip


  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly
        name: Nightly Build
        prerelease: true
        files: |
          linux/jancy-linux-x64.zip
          windows/jancy-windows-x64.zip
          macos/jancy-macos.zip
