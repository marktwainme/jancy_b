name: GitHub CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

permissions:
  contents: write

jobs:
  # ==========================================
  # Windows 构建
  # ==========================================
  windowsBuild:
    name: Windows Build
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        CONFIGURATION: [Debug, Release]
        TARGET_CPU: [x86, amd64]
        LLVM_VERSION: [llvm-3.4.2, llvm-8.0.1]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Environment
        continue-on-error: true
        shell: cmd
        run: |
          set CONFIGURATION=${{matrix.CONFIGURATION}}
          set LLVM_VERSION=${{matrix.LLVM_VERSION}}
          call jancy\ci\github-actions\set-env.bat ${{matrix.TARGET_CPU}}
          call jancy\ci\github-actions\install-windows.bat

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1
        if: ${{ matrix.TARGET_CPU == 'amd64' }}

      - name: Build and Install
        shell: cmd
        run: |
          set CONFIGURATION=${{matrix.CONFIGURATION}}
          set LLVM_VERSION=${{matrix.LLVM_VERSION}}
          call jancy\ci\github-actions\set-env.bat ${{matrix.TARGET_CPU}}
          call axl\ci\github-actions\build-lua.bat
          
          mkdir build
          cd build
          :: 配置时强制指定安装目录为根目录下的 install_dist
          cmake .. %CMAKE_CONFIGURE_FLAGS% -DCMAKE_INSTALL_PREFIX=%CD%\..\install_dist || exit
          cmake --build . --config ${{matrix.CONFIGURATION}} %CMAKE_BUILD_FLAGS% || exit
          :: 提取所有二进制组件（Jancy, AXL, Graco 等）
          cmake --install . --config ${{matrix.CONFIGURATION}}

      - name: Package Windows
        shell: cmd
        run: |
          :: 直接进入 install_dist 打包内部内容，避免包中包
          cd install_dist
          7z a ..\jancy-windows-${{matrix.TARGET_CPU}}-${{matrix.CONFIGURATION}}-${{matrix.LLVM_VERSION}}.zip *
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jancy-windows-${{matrix.TARGET_CPU}}-${{matrix.CONFIGURATION}}-${{matrix.LLVM_VERSION}}
          path: jancy-windows-*.zip
          retention-days: 1

  # ==========================================
  # Linux 构建
  # ==========================================
  linuxBuild:
    name: Linux Build
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        CONFIGURATION: [Debug, Release]
        TARGET_CPU: [x86, amd64]
        LLVM_VERSION: [llvm-12, llvm-14]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install
        shell: bash
        run: |
          export TARGET_CPU=${{matrix.TARGET_CPU}}
          export LLVM_VERSION=${{matrix.LLVM_VERSION}}
          source ./jancy/ci/github-actions/install-linux.sh

      - name: Build and Install
        shell: bash
        run: |
          mkdir build
          cd build
          cmake .. -DTARGET_CPU=${{matrix.TARGET_CPU}} -DCMAKE_BUILD_TYPE=${{matrix.CONFIGURATION}} -DCMAKE_INSTALL_PREFIX=$(pwd)/../install_dist
          make -j$(nproc)
          make install

      - name: Package Linux
        run: |
          # 使用 -C 进入目录打包，防止 tar 包里包含 "install_dist" 这一层文件夹
          tar -czvf jancy-linux-${{matrix.TARGET_CPU}}-${{matrix.CONFIGURATION}}-${{matrix.LLVM_VERSION}}.tar.gz -C ./install_dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jancy-linux-${{matrix.TARGET_CPU}}-${{matrix.CONFIGURATION}}-${{matrix.LLVM_VERSION}}
          path: jancy-linux-*.tar.gz
          retention-days: 1

  # ==========================================
  # macOS 构建
  # ==========================================
  macOsBuild:
    name: macOS Build
    runs-on: ${{ matrix.OS }}
    strategy:
      fail-fast: false
      matrix:
        OS: [macos-15, macos-15-intel]
        CONFIGURATION: [Debug, Release]
        LLVM_VERSION: [llvm@15, llvm@17]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install
        shell: bash
        run: |
          export LLVM_VERSION=${{matrix.LLVM_VERSION}}
          source ./jancy/ci/github-actions/install-osx.sh

      - name: Build and Install
        shell: bash
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{matrix.CONFIGURATION}} -DCMAKE_INSTALL_PREFIX=$(pwd)/../install_dist
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Package macOS
        run: |
          LLVM_VER_CLEAN=$(echo "${{matrix.LLVM_VERSION}}" | tr '@' '-')
          tar -czvf jancy-${{matrix.OS}}-${{matrix.CONFIGURATION}}-$LLVM_VER_CLEAN.tar.gz -C ./install_dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jancy-${{matrix.OS}}-${{matrix.CONFIGURATION}}-${{matrix.LLVM_VERSION}}
          path: jancy-*.tar.gz
          retention-days: 1

  # ==========================================
  # 统一 Nightly Release 发布
  # ==========================================
  nightly-release:
    name: Create / Update Nightly Release
    needs: [windowsBuild, linuxBuild, macOsBuild]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Update Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (Full Jancy Bundle)"
          body: |
            ### Jancy Bundle 自动构建发布
            
            包含组件: **Jancy, Graco, AXL, re2s, Doxyrest**。
            
            - **bin/**: 可执行文件 (.exe / .bin)
            - **lib/**: 库文件 (.lib / .a)
            - **include/**: 开发头文件
            
            *此版本已剔除所有源码和中间编译文件。*
          prerelease: true
          files: release-artifacts/*
          overwrite: true
